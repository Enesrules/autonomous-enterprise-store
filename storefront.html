<html lang="en">
<head>

<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #12121a;
    --bg3: #1a1a28;
    --border: #2a2a3e;
    --text: #e0e0f0;
    --text2: #8888aa;
    --accent: #6c5ce7;
    --accent2: #a29bfe;
    --green: #00cec9;
    --orange: #fdcb6e;
    --red: #ff7675;
    --card-bg: #16162a;
    --shadow: 0 4px 24px rgba(0,0,0,.4);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  a { color: var(--accent2); text-decoration: none; }
  a:hover { text-decoration: underline; }

  header {
    background: linear-gradient(135deg, #1a1a3e 0%, #12121a 50%, #0a0a1a 100%);
    border-bottom: 1px solid var(--border);
    padding: 2rem 1.5rem 1.5rem;
    text-align: center;
  }
  header h1 {
    font-size: 2.2rem;
    background: linear-gradient(135deg, var(--accent2), var(--green));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  header p {
    color: var(--text2);
    font-size: 1.05rem;
    margin-top: .3rem;
  }

  .tab-bar {
    display: flex;
    justify-content: center;
    gap: 1px;
    background: var(--border);
    margin: 0 auto;
    max-width: 400px;
    border-radius: 10px;
    overflow: hidden;
    margin-top: 1.5rem;
  }
  .tab-btn {
    flex: 1;
    padding: .75rem 1.5rem;
    border: none;
    background: var(--bg2);
    color: var(--text2);
    font-size: .95rem;
    cursor: pointer;
    transition: all .2s;
  }
  .tab-btn:hover { background: var(--bg3); color: var(--text); }
  .tab-btn.active { background: var(--accent); color: #fff; }

  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 1.5rem;
    flex: 1;
  }

  .search-bar {
    display: flex;
    gap: .75rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  .search-bar input, .search-bar select {
    padding: .6rem 1rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg2);
    color: var(--text);
    font-size: .9rem;
    outline: none;
    transition: border .2s;
  }
  .search-bar input { flex: 1; min-width: 200px; }
  .search-bar input:focus, .search-bar select:focus { border-color: var(--accent); }
  .search-bar select {
    cursor: pointer;
    min-width: 140px;
  }
  .search-stats {
    color: var(--text2);
    font-size: .85rem;
    margin-bottom: .75rem;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1.25rem;
  }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    transition: transform .2s, box-shadow .2s;
    display: flex;
    flex-direction: column;
  }
  .card:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow);
    border-color: var(--accent);
  }
  .card h3 { font-size: 1.1rem; margin-bottom: .4rem; }
  .card .desc {
    color: var(--text2);
    font-size: .85rem;
    line-height: 1.5;
    flex: 1;
    margin-bottom: .75rem;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card .price {
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--green);
    margin-bottom: .5rem;
  }
  .card .price span {
    font-size: .85rem;
    font-weight: 400;
    color: var(--text2);
  }
  .card .tags {
    display: flex;
    flex-wrap: wrap;
    gap: .4rem;
    margin-bottom: .75rem;
  }
  .card .tag {
    background: rgba(108,92,231,.15);
    color: var(--accent2);
    padding: .2rem .6rem;
    border-radius: 4px;
    font-size: .75rem;
  }
  .card .actions {
    display: flex;
    gap: .5rem;
  }
  .card .actions a, .card .actions button {
    flex: 1;
    text-align: center;
    padding: .5rem;
    border-radius: 8px;
    font-size: .85rem;
    font-weight: 600;
    transition: all .2s;
    text-decoration: none;
    cursor: pointer;
    border: none;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff !important;
  }
  .btn-primary:hover { background: #5a4bd1; }
  .btn-secondary {
    background: var(--bg3);
    color: var(--text) !important;
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { border-color: var(--accent); }

  .asset-card h3 { font-size: 1rem; }
  .asset-meta {
    display: flex;
    gap: .5rem;
    margin: .4rem 0 .75rem;
    flex-wrap: wrap;
  }
  .asset-meta .badge {
    padding: .15rem .5rem;
    border-radius: 4px;
    font-size: .75rem;
    font-weight: 600;
  }
  .badge-cat { background: rgba(0,206,201,.15); color: var(--green); }
  .badge-type { background: rgba(253,203,110,.15); color: var(--orange); }
  .asset-price { font-size: 1.2rem; font-weight: 700; color: var(--green); margin-bottom: .75rem; }

  .pagination {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: .5rem;
    margin-top: 2rem;
    flex-wrap: wrap;
  }
  .page-btn {
    padding: .4rem .85rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg2);
    color: var(--text);
    cursor: pointer;
    font-size: .85rem;
    transition: all .2s;
  }
  .page-btn:hover { border-color: var(--accent); background: var(--bg3); }
  .page-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .page-btn:disabled { opacity: .3; cursor: default; }

  footer {
    border-top: 1px solid var(--border);
    padding: 2rem 1.5rem;
    text-align: center;
    color: var(--text2);
    font-size: .85rem;
    margin-top: auto;
  }
  footer a { color: var(--accent2); }

  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--text2);
  }
  .empty-state h3 { font-size: 1.3rem; margin-bottom: .5rem; color: var(--text); }

  @media (max-width: 640px) {
    header h1 { font-size: 1.6rem; }
    .grid { grid-template-columns: 1fr; }
    .container { padding: 1rem; }
    .tab-bar { max-width: 100%; }
  }
</style>

const ASSETS = [];

// ── STATE ──────────────────────────────────────────────────────────
const PER_PAGE = 24;
let currentSaasPage = 1;
let currentAssetPage = 1;

// ── INIT FILTERS ────────────────────────────────────────────────────
(function initFilters() {
  const stacks = new Set();
  PROJECTS.forEach(p => {
    if (p.stack) stacks.add(p.stack);
  });
  const sel = document.getElementById('saas-stack-filter');
  [...stacks].sort().forEach(s => {
    const opt = document.createElement('option');
    opt.value = s; opt.textContent = s;
    sel.appendChild(opt);
  });

  renderSaas();
  renderAssets();
})();

// ── TAB SWITCHING ──────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
  if (tab === 'saas') {
    document.querySelector('.tab-btn:first-child').classList.add('active');
    document.getElementById('tab-saas').style.display = '';
    renderSaas();
  } else {
    document.querySelector('.tab-btn:last-child').classList.add('active');
    document.getElementById('tab-assets').style.display = '';
    renderAssets();
  }
}

// ── STRIPE CHECKOUT ─────────────────────────────────────────────────
function buyWithStripe(paymentUrl, productName) {
  // Direct link approach: open the Stripe payment page
  window.open(paymentUrl, '_blank');
}

// ── SAAS RENDER ────────────────────────────────────────────────────
function renderSaas() {
  const query = document.getElementById('saas-search').value.toLowerCase();
  const stackFilter = document.getElementById('saas-stack-filter').value;

  let filtered = PROJECTS.filter(p => {
    const name = (p.project || '').toLowerCase();
    const desc = (p.description || '').toLowerCase();
    const stack = (p.stack || '').toLowerCase();
    const matchesSearch = !query || name.includes(query) || desc.includes(query) || stack.includes(query);
    const matchesStack = !stackFilter || p.stack === stackFilter;
    return matchesSearch && matchesStack;
  });

  document.getElementById('saas-stats').textContent = `${filtered.length} products found`;

  const totalPages = Math.max(1, Math.ceil(filtered.length / PER_PAGE));
  if (currentSaasPage > totalPages) currentSaasPage = totalPages;
  const start = (currentSaasPage - 1) * PER_PAGE;
  const pageItems = filtered.slice(start, start + PER_PAGE);

  const grid = document.getElementById('saas-grid');
  grid.innerHTML = pageItems.map(p => {
    const price = p.price_monthly || 19;
    const features = (p.features || []).slice(0, 3);
    const stackTags = (p.stack || '').split(/[+\\/]/).filter(Boolean);
    const projDir = p.dir || '';
    const demoLink = p.has_index ? `projects/${projDir}/index.html` : '#';
    const stripeUrl = p.stripe_payment_url || '';
    const prodName = p.project || projDir;

    return `
      <div class="card">
        <h3>${prodName}</h3>
        <div class="price">$${price}<span>/month</span></div>
        <div class="desc">${p.description || ''}</div>
        <div class="tags">
          ${stackTags.map(t => `<span class="tag">${t.trim()}</span>`).join('')}
        </div>
        <div style="margin-bottom:.6rem;font-size:.8rem;color:var(--text2)">
          ${features.map(f => '✓ ' + f).join('<br>')}
        </div>
        <div class="actions">
          ${stripeUrl
            ? `<button class="btn-primary" onclick="buyWithStripe('${stripeUrl}', '${prodName.replace(/'/g, "\\'")}')">Buy Now</button>`
            : `<button class="btn-primary" disabled>Unavailable</button>`
          }
          <a href="${demoLink}" class="btn-secondary" target="_blank">Live Demo</a>
        </div>
      </div>
    `;
  }).join('');

  if (pageItems.length === 0) {
    grid.innerHTML = '<div class="empty-state"><h3>No products found</h3><p>Try adjusting your search or filters.</p></div>';
  }

  renderPagination('saas', totalPages);
}

// ── ASSET RENDER ───────────────────────────────────────────────────
function renderAssets() {
  const grid = document.getElementById('asset-grid');
  grid.innerHTML = '<div class="empty-state"><h3>Digital Assets</h3><p>Browse our SaaS catalog above.</p></div>';
  document.getElementById('asset-stats').textContent = 'Check back soon for digital assets';
}

// ── PAGINATION ─────────────────────────────────────────────────────
function renderPagination(tab, totalPages) {
  const container = document.getElementById(tab + '-pagination');
  const current = tab === 'saas' ? currentSaasPage : currentAssetPage;

  let html = '';
  html += `<button class="page-btn" onclick="goPage('${tab}', ${current - 1})" ${current <= 1 ? 'disabled' : ''}>‹ Prev</button>`;

  const range = [];
  const maxVisible = 7;
  if (totalPages <= maxVisible) {
    for (let i = 1; i <= totalPages; i++) range.push(i);
  } else {
    range.push(1);
    let startP = Math.max(2, current - 2);
    let endP = Math.min(totalPages - 1, current + 2);
    if (startP > 2) range.push('…');
    for (let i = startP; i <= endP; i++) range.push(i);
    if (endP < totalPages - 1) range.push('…');
    range.push(totalPages);
  }

  range.forEach(p => {
    if (p === '…') {
      html += `<span style="padding:0 .3rem;color:var(--text2)">...</span>`;
    } else {
      html += `<button class="page-btn ${p === current ? 'active' : ''}" onclick="goPage('${tab}', ${p})">${p}</button>`;
    }
  });

  html += `<button class="page-btn" onclick="goPage('${tab}', ${current + 1})" ${current >= totalPages ? 'disabled' : ''}>Next ›</button>`;
  container.innerHTML = html;
}

function goPage(tab, page) {
  if (tab === 'saas') {
    currentSaasPage = page;
    renderSaas();
  } else {
    currentAssetPage = page;
    renderAssets();
  }
  window.scrollTo({ top: document.querySelector('.container').offsetTop - 20, behavior: 'smooth' });
}
</script>
